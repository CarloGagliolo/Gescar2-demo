var TODAY = new Date('2026-03-16T00:00:00');

function parseDate(s) { return s ? new Date(s + 'T00:00:00') : null; }
function formatDate(s) {
  if (!s) return '—';
  var d = parseDate(s);
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function daysLeft(s) {
  var d = parseDate(s);
  if (!d) return null;
  return Math.floor((d - TODAY) / (24*60*60*1000));
}
function scadenzaStatus(s) {
  var dl = daysLeft(s);
  if (dl === null) return 'unknown';
  if (dl < 0)  return 'danger';
  if (dl <= 30) return 'warning';
  return 'ok';
}
function scadenzaBadge(s, label) {
  var status = scadenzaStatus(s);
  var dl = daysLeft(s);
  var cls  = status === 'danger' ? 'badge-scad-danger' : status === 'warning' ? 'badge-scad-warning' : 'badge-scad-ok';
  var icon = status === 'danger' ? 'bi-exclamation-triangle-fill' : status === 'warning' ? 'bi-clock-history' : 'bi-check-circle-fill';
  var extra = '';
  if (dl !== null) {
    if (dl < 0)   extra = ' (' + Math.abs(dl) + ' gg fa)';
    else if (dl <= 30) extra = ' (' + dl + ' gg)';
  }
  return '<span class="badge ' + cls + ' fw-normal"><i class="bi ' + icon + ' me-1"></i>' + (label || formatDate(s)) + extra + '</span>';
}

  var id    = idStr ? parseInt(idStr, 10) : null;

  // active nav
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-nav') === view);
  });

  var container = document.getElementById('app-views');
  var html = '';
  switch (view) {
    case 'dashboard': html = renderDashboard(); break;
    case 'scadenze':  html = renderScadenze();  break;
    case 'clienti':   html = renderClienti(''); break;
    case 'cliente':   html = renderCliente(id); break;
    case 'veicoli':   html = renderVeicoli();   break;
    case 'veicolo':   html = renderVeicolo(id); break;
    case 'notifiche': html = renderNotifiche(); break;
    case 'cerca':     html = renderCerca(parts.slice(1).join('-')); break;
    default:          html = renderDashboard();
  }
  container.innerHTML = '<div>' + html + '</div>';
  window.scrollTo(0, 0);
}

/* ═══════════════════════════════════════════════════════════════════════════
   VIEW: DASHBOARD
   ═══════════════════════════════════════════════════════════════════════════ */
function renderDashboard() {
  var all     = getAllScadenze();
  var expired = 0, warning = 0, ok = 0;
  for (var i = 0; i < all.length; i++) {
    var st = scadenzaStatus(all[i].scadenza);
    if (st === 'danger')  expired++;
    else if (st === 'warning') warning++;
    else ok++;
  }

  // Urgent: expired + warning, sorted by date
  var urgent = all.filter(function(s) { return scadenzaStatus(s.scadenza) !== 'ok'; });
  urgent.sort(function(a,b) { return new Date(a.scadenza) - new Date(b.scadenza); });
  urgent = urgent.slice(0, 12);

  var rows = urgent.map(function(s) {
    var v = s.vettura_id ? getVettura(s.vettura_id) : null;
    var c = getCliente(s.intestatario_id);
    var targaCell    = v ? '<a href="#veicolo-' + v.id + '" class="text-decoration-none fw-semibold">' + esc(v.targa) + '</a>' : '—';
    var clienteCell  = c ? '<a href="#cliente-' + c.id + '" class="text-decoration-none">' + esc(c.cognome) + ' ' + esc(c.nome) + '</a>' : '—';
    return '<tr>'
      + '<td>' + scadenzaBadge(s.scadenza) + '</td>'
      + '<td><span class="badge bg-secondary fw-normal">' + esc(s.tipo) + '</span></td>'
      + '<td>' + targaCell + '</td>'
      + '<td>' + clienteCell + '</td>'
      + '<td><button class="btn btn-sm btn-outline-warning" onclick="openNotifica(' + (s.intestatario_id||0) + ',' + (s.vettura_id||0) + ',\'' + esc(s.tipo) + '\',\'' + esc(s.scadenza) + '\')">'
      + '<i class="bi bi-bell"></i></button></td>'
      + '</tr>';
  }).join('');

  return '<div class="d-flex align-items-center gap-2 mb-3">'
    + '<h4 class="mb-0"><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h4>'
    + '<span class="text-muted small">– ' + TODAY.toLocaleDateString('it-IT') + '</span>'
    + '</div>'

    + '<div class="row g-3 mb-4">'
    + '<div class="col-6 col-md-3"><div class="card h-100 kpi-danger"><div class="card-body py-3">'
    + '<div class="text-muted small mb-1"><i class="bi bi-exclamation-triangle-fill text-danger me-1"></i>Scadute</div>'
    + '<div class="fs-2 fw-bold text-danger">' + expired + '</div></div></div></div>'

    + '<div class="col-6 col-md-3"><div class="card h-100 kpi-warning"><div class="card-body py-3">'
    + '<div class="text-muted small mb-1"><i class="bi bi-clock-history text-warning me-1"></i>In scadenza (≤30 gg)</div>'
    + '<div class="fs-2 fw-bold text-warning">' + warning + '</div></div></div></div>'

    + '<div class="col-6 col-md-3"><div class="card h-100 kpi-ok"><div class="card-body py-3">'
    + '<div class="text-muted small mb-1"><i class="bi bi-check-circle-fill text-success me-1"></i>Regolari</div>'
    + '<div class="fs-2 fw-bold text-success">' + ok + '</div></div></div></div>'

    + '<div class="col-6 col-md-3"><div class="card h-100 kpi-total"><div class="card-body py-3">'
    + '<div class="text-muted small mb-1"><i class="bi bi-list-ul text-primary me-1"></i>Totale</div>'
    + '<div class="fs-2 fw-bold text-primary">' + all.length + '</div></div></div></div>'
    + '</div>'

    + '<div class="card">'
    + '<div class="card-header d-flex align-items-center justify-content-between">'
    + '<span class="fw-semibold"><i class="bi bi-exclamation-circle text-danger me-2"></i>Scadenze urgenti</span>'
    + '<a href="#scadenze" class="btn btn-sm btn-outline-secondary">Vedi tutte</a>'
    + '</div>'
    + '<div class="table-responsive">'
    + '<table class="table table-hover table-sm align-middle mb-0">'
    + '<thead class="table-light"><tr><th>Scadenza</th><th>Tipo</th><th>Targa</th><th>Cliente</th><th></th></tr></thead>'
    + '<tbody>' + (rows || '<tr><td colspan="5" class="text-center text-muted py-3">Nessuna scadenza urgente &#x1F389;</td></tr>') + '</tbody>'
    + '</table></div></div>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   VIEW: CLIENTI (list)
   ═══════════════════════════════════════════════════════════════════════════ */
function renderClienti(filter) {
  var q = filter || '';
  var list = q
    ? CLIENTI.filter(function(c) {
        return (c.cognome + ' ' + c.nome).toLowerCase().indexOf(q.toLowerCase()) !== -1
            || c.email.toLowerCase().indexOf(q.toLowerCase()) !== -1
            || c.cf.toLowerCase().indexOf(q.toLowerCase()) !== -1;
      })
    : CLIENTI;

  var searchBanner = q
    ? '<div class="alert alert-info py-2 mb-3 small"><i class="bi bi-search me-1"></i>Risultati per "<strong>' + esc(q) + '</strong>" — ' + list.length + ' trovati. <a href="#clienti" class="alert-link">Rimuovi filtro</a></div>'
    : '';

  var rows = list.map(function(c) {
    var vetture = VETTURE.filter(function(v) { return v.intestatario_id === c.id; });
    var urgent  = getAllScadenze().filter(function(s) { return s.intestatario_id === c.id && scadenzaStatus(s.scadenza) !== 'ok'; });
    var urgBadge = urgent.length
      ? '<span class="badge badge-scad-' + scadenzaStatus(urgent[0].scadenza) + ' fw-normal ms-1">' + urgent.length + ' urgenti</span>'
      : '';
    var targhe = vetture.map(function(v) {
      return '<a href="#veicolo-' + v.id + '" class="badge bg-light text-dark border me-1 text-decoration-none">' + esc(v.targa) + '</a>';
    }).join('');
    return '<tr>'
      + '<td><a href="#cliente-' + c.id + '" class="text-decoration-none fw-semibold">' + esc(c.cognome) + ' ' + esc(c.nome) + '</a>' + urgBadge + '</td>'
      + '<td class="text-muted small"><i class="bi bi-envelope me-1"></i>' + esc(c.email) + '</td>'
      + '<td class="text-muted small d-none d-md-table-cell"><i class="bi bi-phone me-1"></i>' + esc(c.tel) + '</td>'
      + '<td class="d-none d-lg-table-cell">' + targhe + '</td>'
      + '<td><a href="#cliente-' + c.id + '" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a></td>'
      + '</tr>';

  return '<div class="d-flex align-items-center justify-content-between mb-3">'
    + '<h4 class="mb-0"><i class="bi bi-people me-2 text-primary"></i>Clienti</h4>'
    + '<span class="text-muted small">' + CLIENTI.length + ' totali</span></div>'

    + '<tbody>' + (rows || '<tr><td colspan="5" class="text-center text-muted py-3">Nessun cliente trovato</td></tr>') + '</tbody>'
    + '</table></div></div>';
}

    + '<div class="card">'
    + '<div class="card-header fw-semibold"><i class="bi bi-receipt me-2"></i>Bolli</div>'
    + '<div class="table-responsive"><table class="table table-sm align-middle mb-0">'
    + '<thead class="table-light"><tr><th>Scadenza</th><th>Note</th><th></th></tr></thead>'
    + '<tbody>' + (bolRows || '<tr><td colspan="3" class="text-center text-muted py-2">Nessun bollo</td></tr>') + '</tbody>'
    + '</table></div></div>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   VIEW: NOTIFICHE LOG
   ═══════════════════════════════════════════════════════════════════════════ */
function renderNotifiche() {
  var log = NOTIFICHE_LOG.slice().reverse();
  var rows = log.map(function(n) {
    var c = getCliente(n.destinatario_id);
    var v = n.vettura_id ? getVettura(n.vettura_id) : null;
    return '<tr>'
      + '<td class="text-muted small">' + formatDate(n.data) + '</td>'
      + '<td>' + (c ? '<a href="#cliente-' + c.id + '" class="text-decoration-none">' + esc(c.cognome) + ' ' + esc(c.nome) + '</a>' : '—') + '</td>'
      + '<td>' + (v ? '<a href="#veicolo-' + v.id + '" class="text-decoration-none">' + esc(v.targa) + '</a>' : '—') + '</td>'
      + '<td><span class="badge bg-secondary fw-normal">' + esc(n.tipo) + '</span></td>'
      + '<td><span class="badge bg-light text-dark border fw-normal">' + esc(n.canale) + '</span></td>'
      + '<td><span class="badge bg-success fw-normal"><i class="bi bi-check me-1"></i>' + esc(n.esito) + '</span></td>'
      + '</tr>';
  }).join('');

  return '<div class="d-flex align-items-center justify-content-between mb-3">'
    + '<h4 class="mb-0"><i class="bi bi-bell me-2 text-primary"></i>Storico Notifiche</h4>'
    + '<span class="text-muted small">' + NOTIFICHE_LOG.length + ' inviate</span></div>'
    + '<div class="card"><div class="table-responsive">'
    + '<table class="table table-hover align-middle mb-0">'
    + '<thead class="table-light"><tr><th>Data</th><th>Cliente</th><th>Veicolo</th><th>Tipo</th><th>Canale</th><th>Esito</th></tr></thead>'
    + '<tbody>' + (rows || '<tr><td colspan="6" class="text-center text-muted py-3">Nessuna notifica</td></tr>') + '</tbody>'
    + '</table></div></div>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   VIEW: CERCA
   ═══════════════════════════════════════════════════════════════════════════ */
function renderCerca(encoded) {
  var q = decodeURIComponent(encoded);

  var clientiTrovati = CLIENTI.filter(function(c) {
    return (c.cognome + ' ' + c.nome).toLowerCase().indexOf(q.toLowerCase()) !== -1
        || c.email.toLowerCase().indexOf(q.toLowerCase()) !== -1
        || c.cf.toLowerCase().indexOf(q.toLowerCase()) !== -1;
  });
  var vettureTrovate = VETTURE.filter(function(v) {
    return v.targa.toLowerCase().indexOf(q.toLowerCase()) !== -1
        || v.marca.toLowerCase().indexOf(q.toLowerCase()) !== -1
        || v.modello.toLowerCase().indexOf(q.toLowerCase()) !== -1;
  });

  var clientiRows = clientiTrovati.map(function(c) {
    return '<li class="list-group-item list-group-item-action">'
      + '<a href="#cliente-' + c.id + '" class="text-decoration-none d-block">'
      + '<i class="bi bi-person me-2 text-primary"></i>'
      + '<strong>' + esc(c.cognome) + ' ' + esc(c.nome) + '</strong>'
      + '<span class="text-muted ms-2 small">' + esc(c.email) + '</span>'
      + '</a></li>';
  }).join('');

  var vettureRows = vettureTrovate.map(function(v) {
    var c = getCliente(v.intestatario_id);
    return '<li class="list-group-item list-group-item-action">'
      + '<a href="#veicolo-' + v.id + '" class="text-decoration-none d-block">'
      + '<i class="bi bi-car-front me-2 text-primary"></i>'
      + '<strong>' + esc(v.targa) + '</strong>'
      + '<span class="text-muted ms-2 small">' + esc(v.marca) + ' ' + esc(v.modello) + '</span>'
      + (c ? '<span class="text-muted ms-1 small">— ' + esc(c.cognome) + ' ' + esc(c.nome) + '</span>' : '')
      + '</a></li>';
  }).join('');

  var total = clientiTrovati.length + vettureTrovate.length;

  return '<div class="d-flex align-items-center gap-2 mb-3">'
    + '<h4 class="mb-0"><i class="bi bi-search me-2 text-primary"></i>Ricerca</h4>'
    + '<span class="text-muted small">— "' + esc(q) + '" — ' + total + ' risultati</span>'
    + '<a href="#clienti" class="ms-auto btn btn-sm btn-outline-secondary">Azzera</a>'
    + '</div>'
    + (clientiTrovati.length ? '<h6 class="text-muted text-uppercase small fw-semibold mb-2">Clienti (' + clientiTrovati.length + ')</h6><ul class="list-group mb-3">' + clientiRows + '</ul>' : '')
    + (vettureTrovate.length ? '<h6 class="text-muted text-uppercase small fw-semibold mb-2">Veicoli (' + vettureTrovate.length + ')</h6><ul class="list-group mb-3">' + vettureRows + '</ul>' : '')
    + (total === 0 ? '<div class="text-center py-5 text-muted"><i class="bi bi-search fs-1 d-block mb-2 opacity-25"></i>Nessun risultato per "<strong>' + esc(q) + '</strong>"</div>' : '');
}

/* ═══════════════════════════════════════════════════════════════════════════
   NOTIFICA MODAL
   ═══════════════════════════════════════════════════════════════════════════ */
function openNotifica(clienteId, vetturaId, tipo, scadenza) {
  var c = getCliente(clienteId);
  var v = vetturaId ? getVettura(vetturaId) : null;
  if (!c) { showToast('Cliente non trovato', 'danger'); return; }

  var dl = daysLeft(scadenza);
  var isExpired = dl < 0;
  var targaInfo = v ? ' per il veicolo <strong>' + v.targa + '</strong> (' + v.marca + ' ' + v.modello + ')' : '';
  var scadInfo  = isExpired
    ? 'La <strong>' + tipo + '</strong>' + targaInfo + ' è <span class="text-danger fw-bold">scaduta da ' + Math.abs(dl) + ' giorni</span> (' + formatDate(scadenza) + ').'
    : 'La <strong>' + tipo + '</strong>' + targaInfo + ' scade <span class="text-warning fw-bold">tra ' + dl + ' giorni</span> (' + formatDate(scadenza) + ').';

  document.getElementById('modal-scad-info').innerHTML = scadInfo;
  document.getElementById('modal-destinatario').value  = c.cognome + ' ' + c.nome;
  document.getElementById('modal-email').value         = c.email;
  document.getElementById('modal-via-email').checked   = true;
  document.getElementById('modal-via-sms').checked     = false;

  var targaMsg = v ? ' relativo al veicolo ' + v.targa + ' (' + v.marca + ' ' + v.modello + ')' : '';
  var msg = isExpired
    ? 'Gentile ' + c.nome + ' ' + c.cognome + ',\n\nla informiamo che la ' + tipo + targaMsg + ' \xe8 scaduta il ' + formatDate(scadenza) + '.\n\nLa preghiamo di provvedere al rinnovo al pi\xf9 presto.\n\nCordiali saluti,\nGescar Centro Revisioni'
    : 'Gentile ' + c.nome + ' ' + c.cognome + ',\n\nla informiamo che la ' + tipo + targaMsg + ' scadr\xe0 il ' + formatDate(scadenza) + ' (tra ' + dl + ' giorni).\n\nLa invitiamo a provvedere al rinnovo in tempo utile.\n\nCordiali saluti,\nGescar Centro Revisioni';
  document.getElementById('modal-messaggio').value = msg;

  window._notificaCtx = { clienteId: clienteId, vetturaId: vetturaId, tipo: tipo, scadenza: scadenza };

  var modal = new bootstrap.Modal(document.getElementById('notificaModal'));
  modal.show();
}

function inviaNotifica() {
  var ctx    = window._notificaCtx || {};
  var canali = [];
  if (document.getElementById('modal-via-email').checked) canali.push('Email');
  if (document.getElementById('modal-via-sms').checked)   canali.push('SMS');
  if (!canali.length) { showToast('Seleziona almeno un canale', 'danger'); return; }

  var c = getCliente(ctx.clienteId);
  NOTIFICHE_LOG.push({
    id: NOTIFICHE_LOG.length + 1,
    data: '2026-03-16',
    destinatario_id: ctx.clienteId,
    tipo: ctx.tipo,
    vettura_id: ctx.vetturaId || null,
    canale: canali.join('+'),
    esito: 'Inviata'
  });

  var modal = bootstrap.Modal.getInstance(document.getElementById('notificaModal'));
  if (modal) modal.hide();
  showToast('Notifica inviata a ' + (c ? c.cognome + ' ' + c.nome : '—') + ' via ' + canali.join(' e '), 'success');
}

/* ═══════════════════════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════════════════════ */
function showToast(msg, type) {
  type = type || 'success';
  var tc  = document.getElementById('toast-container');
  var id  = 'toast-' + Date.now();
  var icons = {
    success: 'bi-check-circle-fill text-success',
    danger:  'bi-exclamation-circle-fill text-danger',
    info:    'bi-info-circle-fill text-primary'
  };
  tc.insertAdjacentHTML('beforeend',
    '<div id="' + id + '" class="toast align-items-center border-0 bg-white shadow" role="alert">'
    + '<div class="d-flex">'
    + '<div class="toast-body"><i class="bi ' + (icons[type] || icons.info) + ' me-2"></i>' + esc(msg) + '</div>'
    + '<button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>'
    + '</div></div>');
  var el    = document.getElementById(id);
  var toast = new bootstrap.Toast(el, { delay: 4000 });
  toast.show();
  el.addEventListener('hidden.bs.toast', function() { el.remove(); });
}
</script>
